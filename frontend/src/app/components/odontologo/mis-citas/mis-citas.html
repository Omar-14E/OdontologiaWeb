<div class="container" style="padding: 20px; animation: fadeIn 0.5s ease;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2><span class="material-symbols-outlined" style="vertical-align: text-bottom; color: var(--primary);">event</span> Mis Citas Programadas</h2>
  </div>

  <div *ngIf="cargando" style="text-align: center; padding: 40px; color: #64748b;">
    Cargando tu agenda...
  </div>

  <div *ngIf="!cargando && citas.length === 0" style="text-align: center; padding: 40px; background: white; border-radius: 8px; border: 1px dashed #cbd5e1;">
    No tienes citas asignadas por el momento.
  </div>

  <div class="table-container" *ngIf="!cargando && citas.length > 0" style="background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead style="background-color: #f8fafc; border-bottom: 2px solid #e2e8f0;">
      <tr>
        <th style="padding: 15px;">Fecha y Hora</th>
        <th style="padding: 15px;">Paciente</th>
        <th style="padding: 15px;">Estado</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let cita of citas" style="border-bottom: 1px solid #f1f5f9;">
        <td style="padding: 15px; font-weight: 500;">{{ cita.fechaHora | date:'dd/MM/yyyy HH:mm' }}</td>
        <td style="padding: 15px;">{{ cita.paciente.nombre }} {{ cita.paciente.apellido }}</td>
        <td style="padding: 15px;">
            <span [ngStyle]="{'background-color': cita.estado === 'PENDIENTE' ? '#fef3c7' : '#dcfce3', 'color': cita.estado === 'PENDIENTE' ? '#d97706' : '#16a34a', 'padding': '6px 12px', 'border-radius': '20px', 'font-size': '0.85rem', 'font-weight': '600'}">
              {{ cita.estado }}
            </span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
