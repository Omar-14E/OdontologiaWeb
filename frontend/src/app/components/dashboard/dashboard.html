<div class="dashboard-wrapper" style="padding: 20px;">
  <div class="welcome-header" style="margin-bottom: 30px;">
    <h2>Bienvenido/a, {{ username }}</h2>
    <p style="color: #64748b;">Este es tu resumen de actividad en la clínica.</p>
  </div>

  <div *ngIf="rol === 'ADMIN'" class="grid-cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">

    <div class="card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid var(--primary, #0ea5e9);">
      <h3 style="color: #64748b; font-size: 1rem; margin-bottom: 10px;">Total de Pacientes</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #1e293b;">150</p>
    </div>

    <div class="card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid #10b981;">
      <h3 style="color: #64748b; font-size: 1rem; margin-bottom: 10px;">Médicos Registrados</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #1e293b;">12</p>
    </div>

    <div class="card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid #f59e0b;">
      <h3 style="color: #64748b; font-size: 1rem; margin-bottom: 10px;">Citas de Hoy</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #1e293b;">24</p>
    </div>

  </div>

  <div *ngIf="rol === 'ODONTOLOGO'" class="grid-cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">

    <div class="card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid #8b5cf6;">
      <h3 style="color: #64748b; font-size: 1rem; margin-bottom: 10px;">Mis Citas de Hoy</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #1e293b;">{{ totalCitas }}</p>
    </div>

    <div class="card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid #ec4899;">
      <h3 style="color: #64748b; font-size: 1rem; margin-bottom: 10px;">Mis Pacientes Activos</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #1e293b;">{{ totalPacientes }}</p>
    </div>

  </div>
</div>
