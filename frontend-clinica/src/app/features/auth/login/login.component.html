<div class="login-page">
  <div class="login-wrapper">
    
    <div class="login-visual">
      <img src="https://plus.unsplash.com/premium_photo-1675686363422-7d7ab88ee530?q=80&w=814&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Instrumental Clínico DenSalud" class="bg-image">
      <div class="visual-content">
        <h1>DenSalud</h1>
        <p>Clínica Odontológica Especializada</p>
      </div>
    </div>

    <div class="login-form-container">
      <div class="form-box">
        
        <div class="form-header">
          <h2>Control de Acceso</h2>
          <p>Introduce tus credenciales para ingresar al sistema</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <div class="form-group">
            <input 
              id="username" 
              type="text" 
              name="username"
              autocomplete="username" 
              formControlName="username" 
              placeholder=" " 
            />
            <label for="username">Nombre de usuario o correo</label>
            <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="error-msg">
              <small>El usuario es obligatorio.</small>
            </div>
          </div>

          <div class="form-group">
            <input 
              id="password" 
              type="password" 
              name="password"
              autocomplete="current-password"
              formControlName="password" 
              placeholder=" " 
            />
            <label for="password">Contraseña</label>
            <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-msg">
              <small>Mínimo 6 caracteres requeridos.</small>
            </div>
          </div>

          <div *ngIf="errorMessage" class="server-error-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/></svg>
            {{ errorMessage }}
          </div>

          <button type="submit" [disabled]="loginForm.invalid">
            <span>Ingresar al Sistema</span>
          </button>
        </form>

      </div>
    </div>

  </div>
</div>
