version: '3.8'

services:
  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=odontologia_db
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    ports:
      - "8080:8080"
    restart: on-failure 
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/odontologia_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
    depends_on:
      - db

  frontend:
    build: ./frontend-clinica
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: